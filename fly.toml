app = "member-ldap"
org = "lighthouse-cph-254"
primary_region = "ams"

[build]

[vm]
  size = "shared-cpu-1x"
  memory = "256mb"

[env]
  HTTP_PORT = "8080"
  LDAP_PORT = "636"

# HTTP health-check service
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1
  concurrency = { type = "requests", hard_limit = 25, soft_limit = 20 }

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

# LDAPS — fly terminates TLS, forwards plain LDAP to app
[[services]]
  internal_port = 636
  protocol = "tcp"
  min_machines_running = 0
  max_machines_running = 1

  [[services.concurrency]]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["tls"]
    port = 636

[metrics]
  port = 8080
  path = "/"
